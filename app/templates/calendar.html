{% extends "base.html" %}

{% block title %}Calendar - AI Meeting Scheduler{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/calendar.css') }}">
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
<script src="{{ url_for('static', path='js/calendar.js') }}"></script>

{% endblock %}

{% block content %}
<main class="chat-main w-100 calendar-root">

    <!-- ── Page Header ── -->
    <div class="cal-header">
        <div class="cal-header-left">
            <h1>Calendar</h1>
            <div class="sub">
                <span class="sub-dot" style="width:5px;height:5px;border-radius:50%;background:var(--brand-400);display:inline-block;"></span>
                <span class="cal-count-badge">
                    <i class="fa-regular fa-calendar-check" style="font-size:0.65rem;"></i>
                    <span id="calEventCount">0</span> <span id="calViewLabel">this week</span>
                </span>
            </div>
        </div>
        <div class="cal-header-right">
            <button class="btn-new-event" onclick="openAddModal()">
                <i class="fa-solid fa-plus"></i> New Meeting
            </button>
        </div>
    </div>

    <!-- ── Calendar ── -->
    <div class="cal-wrapper">
        <div id="calendar"></div>
    </div>

</main>

<!-- ══════════ EVENT DETAIL POPOVER ══════════ -->
<div class="ev-popover-overlay" id="popOverlay" onclick="closePopover()"></div>
<div class="ev-popover" id="evPopover">
    <div class="pop-header">
        <div class="pop-color-bar" id="popColorBar"></div>
        <div class="pop-title" id="popTitle">—</div>
        <button class="pop-close" onclick="closePopover()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="pop-body">
        <div class="pop-row">
            <i class="fa-regular fa-calendar pop-row-icon"></i>
            <span class="pop-row-val" id="popDate">—</span>
        </div>
        <div class="pop-row">
            <i class="fa-regular fa-clock pop-row-icon"></i>
            <span class="pop-row-val" id="popTime">—</span>
        </div>
        <div class="pop-row" id="popPlatformRow">
            <i class="fa-solid fa-video pop-row-icon"></i>
            <span class="pop-row-val" id="popPlatform">—</span>
        </div>
        <div class="pop-row" id="popParticipantsRow">
            <i class="fa-solid fa-users pop-row-icon"></i>
            <span class="pop-row-val" id="popParticipants">—</span>
        </div>
        <div class="pop-row" id="popLinkRow">
            <i class="fa-solid fa-link pop-row-icon"></i>
            <span class="pop-row-val link" id="popLink" onclick="joinFromPop()">Join Meeting</span>
        </div>
    </div>
    <div class="pop-footer">
        <button class="pop-btn primary" id="popJoinBtn" onclick="joinFromPop()">
            <i class="fa-solid fa-video"></i> Join
        </button>
        <button class="pop-btn" onclick="editFromPop()">
            <i class="fa-solid fa-pen"></i> Edit
        </button>
        <button class="pop-btn danger" onclick="deleteFromPop()">
            <i class="fa-regular fa-trash-can"></i> Delete
        </button>
    </div>
</div>

<!-- ══════════ ADD / EDIT MODAL ══════════ -->
<div class="modal fade modal-cal" id="calMeetingModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width:480px;">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title" id="calModalTitle">New Meeting</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="calEditId">

                <div class="field-group">
                    <label class="field-label">Meeting Title</label>
                    <input type="text" class="field-input" id="calTitle" placeholder="e.g. Q3 Strategy Review">
                </div>

                <!-- Date + Color picker -->
                <div class="form-inline-row">
                    <i class="fa-regular fa-calendar row-icon"></i>
                    <input type="date" class="field-input" id="calDate" style="width:auto;flex:1;border-radius:10px;padding:7px 12px;font-size:0.84rem;font-weight:600;">
                    <div class="color-dots">
                        <div class="color-dot cd-blue selected" onclick="selectCalColor(this,'blue')" title="Blue"></div>
                        <div class="color-dot cd-green"          onclick="selectCalColor(this,'green')" title="Green"></div>
                        <div class="color-dot cd-purple"         onclick="selectCalColor(this,'purple')" title="Purple"></div>
                        <div class="color-dot cd-amber"          onclick="selectCalColor(this,'amber')" title="Amber"></div>
                    </div>
                </div>

                <!-- Time range -->
                <div class="form-inline-row" style="border-top:none;margin-top:-8px;">
                    <i class="fa-regular fa-clock row-icon"></i>
                    <input type="time" class="form-time-input" id="calTimeStart" value="09:00">
                    <span class="arrow-sep">→</span>
                    <input type="time" class="form-time-input" id="calTimeEnd" value="10:00">
                </div>

                <!-- Type + Platform -->
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="field-label">Type</label>
                        <select class="field-input" id="calType" style="padding:9px 12px;">
                            <option value="Internal">Internal</option>
                            <option value="External">External</option>
                            <option value="Recurring">Recurring</option>
                            <option value="Review">Review</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="field-label">Platform</label>
                        <select class="field-input" id="calPlatform" style="padding:9px 12px;">
                            <option value="Google Meet">Google Meet</option>
                            <option value="Zoom">Zoom</option>
                            <option value="Teams">Microsoft Teams</option>
                            <option value="Phone">Phone Call</option>
                            <option value="In-person">In-person</option>
                        </select>
                    </div>
                </div>

                <div class="field-group">
                    <label class="field-label">Participants (comma-separated emails)</label>
                    <input type="text" class="field-input" id="calParticipants" placeholder="alice@co.com, bob@co.com">
                </div>

                <div class="field-group mb-1">
                    <label class="field-label">Meeting Link</label>
                    <input type="text" class="field-input" id="calLink" placeholder="https://meet.google.com/...">
                </div>
            </div>
            <div class="modal-footer justify-content-end gap-2">
                <button class="cal-btn-cancel" data-bs-dismiss="modal">Cancel</button>
                <button class="cal-btn-save" onclick="saveCalMeeting()">
                    <i class="fa-solid fa-paper-plane"></i>
                    <span id="calSaveLabel">Create Meeting</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ══════════ DELETE CONFIRM MODAL ══════════ -->
<div class="modal fade modal-cal-del" id="calDeleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width:340px;">
        <div class="modal-content">
            <div class="modal-body">
                <div class="del-icon"><i class="fa-solid fa-trash-can"></i></div>
                <div class="del-title">Delete Meeting?</div>
                <div class="del-sub" id="calDelDesc">This meeting will be permanently removed.</div>
                <div class="d-flex gap-3 justify-content-center">
                    <button class="cal-btn-cancel" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn-del-confirm" id="calConfirmDel">Delete</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Toast stack -->
<div class="cal-toast-stack" id="calToastStack"></div>
{% endblock %}
