<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Meeting Scheduler — Smart Calendar Assistant{% endblock %}</title>
    <meta name="description" content="AI-powered meeting scheduler that helps you organize, reschedule, and manage calendar events with natural language.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}?v=2.0">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-shell">

        <!-- ═══ MAIN SIDEBAR ═══ -->
        <aside class="main-sidebar">
            <div class="sidebar-header">
                <a href="/" class="sidebar-brand">
                    <div class="brand-icon">
                        <i class="fa-regular fa-calendar-check"></i>
                    </div>
                    <span class="brand-text">Schedule.AI</span>
                </a>
            </div>

            <div class="sidebar-divider"></div>

            <div class="sidebar-nav">
                <div class="sidebar-section-label">Main</div>
                <a href="/" class="nav-item {% if active_page == 'assistant' %}active{% endif %}">
                    <i class="fa-solid fa-robot"></i>
                    <span>AI Assistant</span>
                </a>
                <a href="/meetings" class="nav-item {% if active_page == 'meetings' %}active{% endif %}">
                    <i class="fa-regular fa-calendar-check"></i>
                    <span>Meetings</span>
                </a>
                <a href="/calendar" class="nav-item {% if active_page == 'calendar' %}active{% endif %}">
                    <i class="fa-regular fa-calendar"></i>
                    <span>Calendar</span>
                </a>
                <a href="/contacts" class="nav-item {% if active_page == 'contacts' %}active{% endif %}">
                    <i class="fa-solid fa-user-group"></i>
                    <span>Contacts</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="sidebar-nav">
                    <a href="/settings" class="nav-item {% if active_page == 'settings' %}active{% endif %}">
                        <i class="fa-solid fa-gear"></i>
                        <span>Settings</span>
                    </a>
                </div>

                <div class="user-profile-card">
                    <div class="user-avatar-lg">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="user-info">
                        <span class="user-name">Alex Johnson</span>
                        <span class="user-plan">Pro Account</span>
                    </div>
                </div>
            </div>
        </aside>

        {% block content %}{% endblock %}

    </div>

    <!-- ═══ MEETING MODAL ═══ -->
    <div class="modal fade" id="meetingModal" tabindex="-1" aria-labelledby="meetingModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-premium">
                <div class="modal-header">
                    <div class="d-flex align-items-center gap-3">
                        <div class="modal-icon"><i class="fa-regular fa-calendar-plus"></i></div>
                        <h5 class="modal-title fw-bold" id="meetingModalLabel" style="font-family:'Plus Jakarta Sans',sans-serif;">Schedule Meeting</h5>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="meetingForm">
                        <div class="form-floating-group mb-4">
                            <label class="form-label-sm">Meeting Title</label>
                            <input type="text" class="form-input" placeholder="e.g. Weekly Sync" id="meetingTitle" required>
                        </div>
                        <div class="form-floating-group mb-4">
                            <label class="form-label-sm">Participants</label>
                            <div class="input-with-icon">
                                <i class="fa-solid fa-user-plus"></i>
                                <input type="text" class="form-input" placeholder="Add email addresses..." id="meetingParticipants">
                            </div>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <label class="form-label-sm">Date</label>
                                <input type="date" class="form-input" id="meetingDate" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label-sm">Time</label>
                                <input type="time" class="form-input" id="meetingTime" required>
                            </div>
                        </div>
                        <div class="form-floating-group mb-4">
                            <label class="form-label-sm">Duration</label>
                            <select class="form-input" id="meetingDuration">
                                <option value="15">15 minutes</option>
                                <option value="30" selected>30 minutes</option>
                                <option value="45">45 minutes</option>
                                <option value="60">1 hour</option>
                            </select>
                        </div>
                        <div class="form-floating-group">
                            <label class="form-label-sm">Meeting Link</label>
                            <div class="input-with-icon link-input">
                                <i class="fa-solid fa-video"></i>
                                <input type="text" class="form-input" id="meetingLink" placeholder="Auto-generated or paste link">
                                <button type="button" class="copy-btn" title="Copy"><i class="fa-regular fa-copy"></i></button>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn-confirm" onclick="saveMeeting()">
                        <i class="fa-solid fa-paper-plane me-2"></i>Confirm & Invite
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="{{ url_for('static', path='js/script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
